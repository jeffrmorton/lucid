name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: cd server && uv sync --dev && uv run ruff check .
      - run: cd sdk/python && uv sync --dev && uv run ruff check .
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd web && corepack enable && pnpm install && npx biome check src/

  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: cd server && uv sync --dev && uv run pytest --cov --cov-fail-under=100

  test-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: cd sdk/python && uv sync --dev && uv run pytest --cov --cov-fail-under=100

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd web && corepack enable && pnpm install && pnpm test

  typecheck-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: cd server && uv sync --dev && uv run pyright .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: cd server && uv sync --dev && uv run bandit -r lucid_server/ -c ../bandit.yaml

  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: cd server && uv sync --dev && uv run vulture lucid_server/ ../vulture_whitelist.py --min-confidence 80

  build:
    runs-on: ubuntu-latest
    needs: [lint, test-server, test-sdk, test-web, typecheck-python, security, dead-code]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd web && corepack enable && pnpm install && pnpm build
